services:
  web:
    build: .
    image: smelly-loot:latest
    container_name: smelly-loot
    restart: unless-stopped
    ports:
      # Host port is configurable via HOST_PORT in .env so the
      # deployment can sit alongside other services without colliding
      # with their port assignments. The container always listens on
      # 3000.
      - "${HOST_PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      # Persist the SQLite database and any other runtime artefacts
      # under data/ so container rebuilds keep the loot history.
      - ./data:/app/data
